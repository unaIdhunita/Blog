<!DOCTYPE html>
<html lang="es">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Django Blog</title>
      <link rel="stylesheet" href="style.css">
</head>
<body>
      <header class="blog-header">
            <h1>Django Blog</h1>
            <hr>
      </header>
<main>
      <article>
            {% for post in posts %}
                  <p><small><strong>Publicado:</strong> {{ post.published_date }}</small></p>
                  <h2>{{ post.title }}</h2>
                  <p>{{ post.text|linebreaksbr }}</p>
                  <hr>
            {% empty %}
                  <p>Todavía no hay posts publicados.</p>
            {% endfor %}
      </article>
      </main>
      <footer>
            <p><small>2026 Django Blog</small></p>
      </footer>
</body>
</html>
